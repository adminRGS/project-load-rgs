<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Rose Garden Scan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fce4ec; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 2px solid #f06292; }
        h2 { color: #d81b60; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #880e4f; }
        select, input, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #f48fb1; box-sizing: border-box; }
        button { background-color: #f06292; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; }
        button:hover { background-color: #d81b60; }
        .mensaje { margin-top: 20px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌹 Panel de Carga Correcto</h2>
    
    <label for="historia">Selecciona la historia:</label>
    <select id="historia" required>
        <option value="" disabled selected>-- Elige una historia --</option>
        <option value="confesion">Confesión</option>
        <option value="lobo">El Lobo</option>
        <option value="matrimonio">Matrimonio por Contrato</option>
        <option value="guarderia">La Guardería</option>
        <option value="embarazada">Embarazada por Error</option>
    </select>

    <label for="capitulo">Número de Capítulo:</label>
    <input type="number" id="capitulo" step="0.1" placeholder="Ej: 1" required>

    <label for="link">Link de Google Drive:</label>
    <input type="url" id="link" placeholder="Pega el link aquí" required>

    <button onclick="guardarCapitulo()">🚀 Guardar Capítulo</button>
    <div id="mensaje" class="mensaje"></div>
</div>

<script>
    // IMPORTANTE: PEGA AQUÍ TUS DATOS DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "tu-proyecto.firebaseapp.com",
        projectId: "tu-proyecto-id",
        storageBucket: "tu-proyecto.appspot.com",
        messagingSenderId: "tu-id",
        appId: "tu-app-id"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    async function guardarCapitulo() {
        const historia = document.getElementById('historia').value;
        const numCap = document.getElementById('capitulo').value;
        const linkDrive = document.getElementById('link').value;
        const divMensaje = document.getElementById('mensaje');

        if (!historia || !numCap || !linkDrive) {
            alert("Llena todos los campos.");
            return;
        }

        // El ID del documento será capitulo_1, capitulo_2, etc.
        const docId = "capitulo_" + numCap;

        try {
            // USAMOS .set PARA CREAR EL DOCUMENTO LIMPIO
            await db.collection(historia).doc(docId).set({
                numero: parseFloat(numCap),
                link: linkDrive, // AQUÍ FORZAMOS EL NOMBRE "link"
                fecha: new Date().toISOString()
            });

            divMensaje.style.display = "block";
            divMensaje.style.backgroundColor = "#c8e6c9";
            divMensaje.style.color = "#2e7d32";
            divMensaje.innerHTML = "✅ ¡Capítulo " + numCap + " guardado perfectamente!";
            
            document.getElementById('capitulo').value = "";
            document.getElementById('link').value = "";
            
        } catch (error) {
            console.error(error);
            divMensaje.style.display = "block";
            divMensaje.style.backgroundColor = "#ffcdd2";
            divMensaje.innerHTML = "❌ Error: " + error.message;
        }
    }
</script>
</body>
</html>
