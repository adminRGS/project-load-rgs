<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Rose Garden - CARGA TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fce4ec; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; border: 2px solid #f06292; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: #d81b60; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #880e4f; }
        select, input, textarea, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #f48fb1; box-sizing: border-box; }
        textarea { height: 200px; font-family: monospace; font-size: 11px; }
        button { background-color: #f06292; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #d81b60; }
        #panelControl { display: none; }
        #mensaje { display:none; margin-top:15px; text-align:center; font-weight:bold; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <h2>🔐 Rose Garden Scan</h2>
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="verificarPass()">Entrar</button>
    </div>

    <div id="panelControl">
        <h2>🌹 Cargar Capítulo</h2>
        <label>Proyecto:</label>
        <select id="historia">
            <option value="confesion">Confesión</option>
            <option value="lobo">Soy un lobo pero no te lastimaré</option>
            <option value="matrimonio">Matrimonio de conveniencia una obsesión</option>
            <option value="guarderia">La guardería de la villana</option>
            <option value="embarazada">Fingí estar embarazada pero mi marido regresó</option>
            <option value="princesa">No solo encanté a la princesa</option>
            <option value="amigos">Los amigos no hacen esto</option>
            <option value="hermana">Mi hermana que era mi enemiga ahora me ama</option>
            <option value="leopardo">La pequeña bebé leopardo</option>
            <option value="salvada">Salvada por la pequeña dama sin poderes</option>
        </select>

        <label>Número de Capítulo:</label>
        <input type="number" id="capitulo" step="0.1" placeholder="Ej: 5">

        <label>Pegar Links de Drive:</label>
        <textarea id="links" placeholder="Pega todos los links aquí..."></textarea>

        <button id="btnPublicar" onclick="guardarCapitulo()">🚀 CARGAR CAPÍTULO COMPLETO</button>
        <div id="mensaje"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvTN_fjSZgGcEaraGeWSrnyUci_gsJ9cs",
        authDomain: "prgs-f2ef8.firebaseapp.com",
        projectId: "prgs-f2ef8",
        storageBucket: "prgs-f2ef8.firebasestorage.app",
        messagingSenderId: "639472415083",
        appId: "1:639472415083:web:2940245a8a70ed6c88dc2e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function verificarPass() {
        if (document.getElementById('passInput').value === "Rose2026") {
            document.getElementById('login').style.display = "none";
            document.getElementById('panelControl').style.display = "block";
        } else { alert("Clave incorrecta"); }
    }

    function forzarLinkDirecto(url) {
        if (url.includes('drive.google.com')) {
            let id = "";
            if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
            else if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; }
            return id ? `https://lh3.googleusercontent.com/u/0/d/${id}` : url;
        }
        return url;
    }

    async function guardarCapitulo() {
        const historia = document.getElementById('historia').value;
        const numCap = document.getElementById('capitulo').value;
        const textoLinks = document.getElementById('links').value;
        const btn = document.getElementById('btnPublicar');
        const msg = document.getElementById('mensaje');

        const listaLinks = textoLinks.split(/[\s,]+/).filter(l => l.trim().length > 10).map(l => forzarLinkDirecto(l.trim()));

        if (!numCap || listaLinks.length === 0) { alert("Llena los campos"); return; }
        btn.disabled = true; btn.innerText = "⏳ Subiendo...";

        try {
            const idDoc = "capitulo_" + numCap;
            const datos = {
                id: idDoc,
                numero: parseFloat(numCap),
                num: parseFloat(numCap),
                imagenes: listaLinks,
                fechaCarga: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection(historia).doc(idDoc).set(datos);
            
            msg.style.display = "block"; msg.style.backgroundColor = "#e8f5e9"; msg.style.color = "#2e7d32";
            msg.innerHTML = "✅ Publicado: " + listaLinks.length + " imágenes.";
            document.getElementById('links').value = "";
        } catch (e) { alert("Error: " + e.message); }
        btn.disabled = false; btn.innerText = "🚀 CARGAR CAPÍTULO COMPLETO";
    }
</script>
</body>
</html>
