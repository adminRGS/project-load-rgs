<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confesión - Rose Garden Scan</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: 'serif'; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        header { padding: 30px; text-align: center; }
        h1 { background: linear-gradient(90deg, #ff66b2, #ffd700); -webkit-background-clip: text; color: transparent; }
        
        .grid-caps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; max-width: 500px; padding-bottom: 50px; }
        .cap-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #444; text-align: center; padding: 15px 0; border-radius: 10px; font-weight: bold; }
        .disponible { border: 1px solid #ff66b2 !important; color: white !important; background: rgba(255, 102, 178, 0.2) !important; cursor: pointer; }

        /* NAVEGACIÓN LECTOR */
        #lector { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; overflow-y: scroll; scroll-behavior: smooth; }
        #contenido-imagenes img { width: 100%; display: block; margin-bottom: -1px; }
        .nav-lector { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0, 0, 0, 0.8); padding: 10px 20px; border-radius: 30px; border: 1px solid #ff66b2; backdrop-filter: blur(10px); z-index: 102; }
        .nav-btn { background: #ff66b2; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background: #444; opacity: 0.5; }
    </style>
</head>
<body>

<div id="lector">
    <div class="nav-lector">
        <button id="btn-ant" class="nav-btn" onclick="capAnterior()">← Ant.</button>
        <button class="nav-btn" style="background:#ff4d4d" onclick="cerrarLector()">✕</button>
        <button id="btn-sig" class="nav-btn" onclick="capSiguiente()">Sig. →</button>
    </div>
    <div id="contenido-imagenes"></div>
</div>

<header><h1>Confesión</h1></header>
<div class="grid-caps" id="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvTN_fjSZgGcEaraGeWSrnyUci_gsJ9cs",
        authDomain: "prgs-f2ef8.firebaseapp.com",
        projectId: "prgs-f2ef8",
        storageBucket: "prgs-f2ef8.firebasestorage.app",
        messagingSenderId: "639472415083",
        appId: "1:639472415083:web:2940245a8a70ed6c88dc2e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const historiaID = "confesion";
    let capActual = 1;

    function arreglarLink(url) {
        if (url.includes('drive.google.com')) {
            let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        }
        return url;
    }

    for (let i = 1; i <= 200; i++) {
        const btn = document.createElement('div');
        btn.innerText = i; btn.className = 'cap-btn'; btn.id = "btn-" + i;
        document.getElementById('grid').appendChild(btn);
    }

    async function activarCapitulos() {
        const querySnapshot = await getDocs(collection(db, historiaID));
        querySnapshot.forEach((doc) => {
            const num = parseInt(doc.id.replace("capitulo_", ""));
            const boton = document.getElementById("btn-" + num);
            if (boton) { boton.classList.add('disponible'); boton.onclick = () => abrirLector(num); }
        });
    }
    activarCapitulos();

    window.abrirLector = async function(num) {
        capActual = num;
        const lector = document.getElementById('lector');
        const contenedor = document.getElementById('contenido-imagenes');
        lector.style.display = 'block'; lector.scrollTop = 0;
        contenedor.innerHTML = "<p style='text-align:center; padding:50px;'>Cargando tiras...</p>";

        document.getElementById('btn-ant').disabled = (num <= 1);
        const sigExiste = document.getElementById("btn-" + (num + 1))?.classList.contains('disponible');
        document.getElementById('btn-sig').disabled = !sigExiste;

        try {
            const docSnap = await getDoc(doc(db, historiaID, "capitulo_" + num));
            if (docSnap.exists()) {
                const data = docSnap.data();
                contenedor.innerHTML = "";
                let imgs = Array.isArray(data.imagenes) ? data.imagenes : (data.link ? [data.link] : []);
                imgs.forEach(url => {
                    const img = document.createElement('img');
                    img.src = arreglarLink(url);
                    contenedor.appendChild(img);
                });
            }
        } catch (e) { console.error(e); }
    }

    window.capAnterior = () => { if(capActual > 1) abrirLector(capActual - 1); };
    window.capSiguiente = () => { abrirLector(capActual + 1); };
    window.cerrarLector = () => { document.getElementById('lector').style.display = 'none'; };
</script>
</body>
</html>
