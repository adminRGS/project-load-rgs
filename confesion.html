<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confesión - Rose Garden Scan</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%); color: white; font-family: 'serif'; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; min-height: 100vh; }
        
        /* BOTÓN VOLVER AL CATÁLOGO */
        .contenedor-regreso { width: 100%; padding: 20px; display: flex; justify-content: flex-start; box-sizing: border-box; }
        .btn-catalogo { text-decoration: none; color: #ff66b2; border: 1px solid #ff66b2; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-catalogo:hover { background: #ff66b2; color: white; box-shadow: 0 0 15px rgba(255, 102, 178, 0.5); }

        header { padding: 10px 20px; text-align: center; }
        h1 { font-size: 2.2rem; background: linear-gradient(90deg, #ff66b2, #ffd700, #ff66b2); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: shine 3s linear infinite; margin: 10px 0; }
        @keyframes shine { to { background-position: 200% center; } }

        .grid-caps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 90%; max-width: 500px; padding-bottom: 50px; margin-top: 20px; }
        .cap-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #444; text-align: center; padding: 18px 0; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .disponible { border: 1px solid #ff66b2 !important; color: white !important; background: rgba(255, 102, 178, 0.2) !important; cursor: pointer; box-shadow: 0 0 10px rgba(255, 102, 178, 0.3); }

        /* LECTOR */
        #lector { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; overflow-y: scroll; scroll-behavior: smooth; }
        #contenido-imagenes img { width: 100%; display: block; margin-bottom: -1px; }
        
        .nav-lector { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0, 0, 0, 0.85); padding: 10px 20px; border-radius: 30px; border: 1px solid #ff66b2; backdrop-filter: blur(10px); z-index: 102; box-shadow: 0 0 20px rgba(255, 102, 178, 0.3); }
        .nav-btn { background: #ff66b2; color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); }
        .nav-btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="contenedor-regreso">
        <a href="index.html" class="btn-catalogo">🏠 Volver al Catálogo</a>
    </div>

    <header>
        <h1>Confesión</h1>
    </header>

    <div id="lector">
        <div class="nav-lector">
            <button id="btn-ant" class="nav-btn" onclick="capAnterior()">← Ant.</button>
            <button class="nav-btn" style="background:#ff4d4d" onclick="cerrarLector()">✕</button>
            <button id="btn-sig" class="nav-btn" onclick="capSiguiente()">Sig. →</button>
        </div>
        <div id="contenido-imagenes"></div>
    </div>

    <div class="grid-caps" id="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvTN_fjSZgGcEaraGeWSrnyUci_gsJ9cs",
        authDomain: "prgs-f2ef8.firebaseapp.com",
        projectId: "prgs-f2ef8",
        storageBucket: "prgs-f2ef8.firebasestorage.app",
        messagingSenderId: "639472415083",
        appId: "1:639472415083:web:2940245a8a70ed6c88dc2e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const historiaID = "confesion"; 
    let capActual = 1;

    function arreglarLink(url) {
        if (url.includes('drive.google.com')) {
            let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        }
        return url;
    }

    // Generamos los botones del grid
    for (let i = 1; i <= 40; i++) {
        const btn = document.createElement('div');
        btn.innerText = i; btn.className = 'cap-btn'; btn.id = "btn-" + i;
        document.getElementById('grid').appendChild(btn);
    }

    async function activarCapitulos() {
        try {
            const querySnapshot = await getDocs(collection(db, historiaID));
            querySnapshot.forEach((doc) => {
                const numStr = doc.id.replace("capitulo_", "");
                const num = parseFloat(numStr);
                const boton = document.getElementById("btn-" + num);
                if (boton) { 
                    boton.classList.add('disponible'); 
                    boton.onclick = () => abrirLector(num); 
                }
            });
        } catch (e) { console.error("Error activando caps:", e); }
    }
    activarCapitulos();

    window.abrirLector = async function(num) {
        capActual = num;
        const lector = document.getElementById('lector');
        const contenedor = document.getElementById('contenido-imagenes');
        lector.style.display = 'block'; 
        lector.scrollTop = 0;
        contenedor.innerHTML = "<p style='text-align:center; padding-top:100px; color:#ff66b2;'>✨ Cargando arte ✨</p>";

        // Configurar botones de navegación
        document.getElementById('btn-ant').disabled = (num <= 1);
        const sigExiste = document.getElementById("btn-" + (num + 1))?.classList.contains('disponible');
        document.getElementById('btn-sig').disabled = !sigExiste;

        try {
            const docSnap = await getDoc(doc(db, historiaID, "capitulo_" + num));
            if (docSnap.exists()) {
                const data = docSnap.data();
                contenedor.innerHTML = "";
                
                // BLINDAJE: Detecta si es lista, texto o link único
                let imgs = [];
                if (Array.isArray(data.imagenes)) { imgs = data.imagenes; }
                else if (typeof data.imagenes === 'string') { imgs = data.imagenes.split(','); }
                else if (data.link) { imgs = [data.link]; }

                imgs.forEach(url => {
                    if (url.trim().length > 5) {
                        const img = document.createElement('img');
                        img.src = arreglarLink(url.trim());
                        contenedor.appendChild(img);
                    }
                });
            }
        } catch (e) { console.error("Error en lector:", e); }
    }

    window.capAnterior = () => { if(capActual > 1) abrirLector(capActual - 1); };
    window.capSiguiente = () => { abrirLector(capActual + 1); };
    window.cerrarLector = () => { 
        document.getElementById('lector').style.display = 'none'; 
        document.getElementById('contenido-imagenes').innerHTML = "";
    };
</script>
</body>
</html>
