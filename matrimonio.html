<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrimonio de Conveniencia - Rose Garden Scan</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1a0a1a 0%, #050505 100%); 
            color: white; font-family: 'serif'; 
            display: flex; flex-direction: column; align-items: center; 
            overflow-x: hidden; min-height: 100vh; 
        }
        
        /* FONDO DE BRILLITOS ANIMADOS */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle, #fff 1px, transparent 1px),
                radial-gradient(circle, #fff 1.5px, transparent 1.5px);
            background-size: 80px 80px, 150px 150px;
            opacity: 0.2;
            animation: moveStars 30s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-150px); }
        }

        /* BOTÓN VOLVER */
        .contenedor-regreso { width: 100%; padding: 20px; display: flex; justify-content: flex-start; box-sizing: border-box; z-index: 10; }
        .btn-catalogo { 
            text-decoration: none; color: #ff66b2; 
            border: 2px solid #ff66b2; padding: 10px 22px; 
            border-radius: 30px; font-weight: bold; font-size: 0.95rem; 
            transition: 0.3s; background: rgba(255, 102, 178, 0.1);
            backdrop-filter: blur(8px);
        }
        .btn-catalogo:hover { background: #ff66b2; color: white; box-shadow: 0 0 20px #ff66b2; }

        header { padding: 15px; text-align: center; z-index: 10; }
        h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(90deg, #ff66b2, #ffd700, #ff66b2); 
            background-size: 200% auto; -webkit-background-clip: text; 
            color: transparent; animation: shineText 4s linear infinite; margin: 10px 0; 
            padding: 0 15px;
        }
        @keyframes shineText { to { background-position: 200% center; } }

        /* GRID DE CAPÍTULOS */
        .grid-caps { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; width: 92%; max-width: 500px; 
            padding-bottom: 60px; margin-top: 25px; z-index: 10;
        }
        .cap-btn { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            color: #555; text-align: center; padding: 20px 0; 
            border-radius: 15px; font-weight: bold; transition: 0.4s ease; 
        }
        .disponible { 
            border: 1px solid #ff66b2 !important; 
            color: white !important; 
            background: rgba(255, 102, 178, 0.15) !important; 
            cursor: pointer; 
        }
        .disponible:hover { transform: translateY(-5px); box-shadow: 0 0 20px #ff66b2; }

        /* LECTOR */
        #lector { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; overflow-y: scroll; scroll-behavior: smooth; }
        #contenido-imagenes img { width: 100%; display: block; margin-bottom: -1px; }
        
        .nav-lector { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; background: rgba(0, 0, 0, 0.9); 
            padding: 12px 25px; border-radius: 35px; border: 1px solid #ff66b2; 
            z-index: 102; 
        }
        .nav-btn { background: #ff66b2; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background: #333; opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="contenedor-regreso">
        <a href="historias.html" class="btn-catalogo">🏠 Volver</a>
    </div>

    <header>
        <h1>Matrimonio de conveniencia a una obsesión</h1>
    </header>

    <div id="lector">
        <div class="nav-lector">
            <button id="btn-ant" class="nav-btn" onclick="capAnterior()">← Ant.</button>
            <button class="nav-btn" style="background:#ff4d4d" onclick="cerrarLector()">✕</button>
            <button id="btn-sig" class="nav-btn" onclick="capSiguiente()">Sig. →</button>
        </div>
        <div id="contenido-imagenes"></div>
    </div>

    <div class="grid-caps" id="grid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvTN_fjSZgGcEaraGeWSrnyUci_gsJ9cs",
        authDomain: "prgs-f2ef8.firebaseapp.com",
        projectId: "prgs-f2ef8",
        storageBucket: "prgs-f2ef8.firebasestorage.app",
        messagingSenderId: "639472415083",
        appId: "1:639472415083:web:2940245a8a70ed6c88dc2e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const historiaID = "matrimonio"; 
    let capActual = 1;

    function arreglarLink(url) {
        if (url.includes('drive.google.com')) {
            let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
            return `http://googleusercontent.com/profile/picture/5{id}`;
        }
        return url;
    }

    // Generar exactamente 56 botones
    for (let i = 1; i <= 56; i++) {
        const btn = document.createElement('div');
        btn.innerText = i; btn.className = 'cap-btn'; btn.id = "btn-" + i;
        document.getElementById('grid').appendChild(btn);
    }

    async function activarCapitulos() {
        try {
            const querySnapshot = await getDocs(collection(db, historiaID));
            querySnapshot.forEach((doc) => {
                const numStr = doc.id.replace("capitulo_", "");
                const num = parseInt(numStr);
                const boton = document.getElementById("btn-" + num);
                if (boton) { 
                    boton.classList.add('disponible'); 
                    boton.onclick = () => abrirLector(num); 
                }
            });
        } catch (e) { console.error(e); }
    }
    activarCapitulos();

    window.abrirLector = async function(num) {
        capActual = num;
        const lector = document.getElementById('lector');
        const contenedor = document.getElementById('contenido-imagenes');
        lector.style.display = 'block'; lector.scrollTop = 0;
        contenedor.innerHTML = "<p style='text-align:center; padding-top:100px; color:#ff66b2;'>✨ Preparando los votos... ✨</p>";

        document.getElementById('btn-ant').disabled = (num <= 1);
        const sigExiste = document.getElementById("btn-" + (num + 1))?.classList.contains('disponible');
        document.getElementById('btn-sig').disabled = !sigExiste;

        try {
            const docSnap = await getDoc(doc(db, historiaID, "capitulo_" + num));
            if (docSnap.exists()) {
                const data = docSnap.data();
                contenedor.innerHTML = "";
                let imgs = Array.isArray(data.imagenes) ? data.imagenes : [];
                imgs.forEach(url => {
                    const img = document.createElement('img');
                    img.src = arreglarLink(url);
                    contenedor.appendChild(img);
                });
            }
        } catch (e) { console.error(e); }
    }

    window.capAnterior = () => { if(capActual > 1) abrirLector(capActual - 1); };
    window.capSiguiente = () => { abrirLector(capActual + 1); };
    window.cerrarLector = () => { document.getElementById('lector').style.display = 'none'; };
</script>
</body>
</html>
